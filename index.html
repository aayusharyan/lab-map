<!DOCTYPE html>
<!--
  Entry point for the SPA. Vite injects the bundled JS/CSS during build.
  Includes a loading fallback and noscript message for accessibility.

  Theme Flash Prevention:
  An inline script runs BEFORE the page renders to apply the saved theme
  (dark/light) from localStorage. This prevents the "flash of incorrect
  theme" (FOIT) that would otherwise occur when React hydrates.
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Map</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!--
    Theme initialization script - MUST run before body renders.
    Reads theme from localStorage and sets data-theme attribute + CSS variables
    on <html> element to prevent white/dark flash on page load.
  -->
  <script type="text/javascript">
    (function() {
      /* Theme colors - must match style.css */
      var themes = {
        dark:  { bg: '#0f1117', text: '#e8eaf0' },
        light: { bg: '#f0f2f7', text: '#111827' }
      };
      /* Read saved theme, default to system preference, fallback to light for old systems */
      var theme = 'light';
      if (window.matchMedia) {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
      }
      try {
        var saved = localStorage.getItem('topology-theme');
        if (saved === 'light' || saved === 'dark') theme = saved;
      } catch (e) { /* localStorage may be blocked in private mode */ }
      /* Apply theme immediately */
      var colors = themes[theme];
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.setProperty('--initial-bg', colors.bg);
      document.documentElement.style.setProperty('--initial-text', colors.text);
    })();
  </script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      /* Use theme-aware background immediately */
      background: var(--initial-bg, #0f1117);
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Loading fallback: shown until React mounts, then replaced -->
    <div id="fallback"
      style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; background: var(--initial-bg, #0f1117); color: var(--initial-text, #e8eaf0); text-align: center; padding: 2rem;">
      <img src="/favicon-192.png" alt="Lab Map" style="width: 64px; height: 64px; margin-bottom: 1.5rem;" />
      <h1 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem;">Loading Lab Map...</h1>
      <p style="opacity: 0.7; max-width: 400px;">If this message persists, please ensure JavaScript is enabled in your
        browser.</p>
      <p style="opacity: 0.5; margin-top: 1.5rem; font-size: 0.875rem;">If you think this is a mistake, please <a
          href="https://github.com/aayusharyan/lab-map/issues/new?template=website-error.yml" target="_blank" rel="noopener noreferrer"
          style="color: #4c7eff; text-decoration: underline;">raise a bug report</a>.</p>
    </div>
  </div>

  <!-- Noscript fallback: shown when JavaScript is disabled (uses dark theme as default) -->
  <noscript>
    <style>
      #fallback {
        display: none !important;
      }
    </style>
    <div
      style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e8eaf0; text-align: center; padding: 2rem;">
      <img src="/favicon-192.png" alt="Lab Map" style="width: 64px; height: 64px; margin-bottom: 1.5rem;" />
      <h1 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem;">JavaScript Required</h1>
      <p style="opacity: 0.7; max-width: 400px;">Lab Map requires JavaScript to run. Please enable JavaScript in your
        browser settings and reload the page.</p>
      <p style="opacity: 0.5; margin-top: 1.5rem; font-size: 0.875rem;">If you think this is a mistake, please <a
          href="https://github.com/aayusharyan/lab-map/issues/new?template=website-error.yml" target="_blank" rel="noopener noreferrer"
          style="color: #4c7eff; text-decoration: underline;">raise a bug report</a>.</p>
    </div>
  </noscript>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
