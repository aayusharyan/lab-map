# =============================================================================
# @file nginx.conf
# @description Nginx configuration for serving Lab Map as a static SPA
#
# Nginx configuration for serving the production build as a static SPA.
# Used by the Docker container - see docker-compose.yml for deployment.

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────────
    # Compression - reduces bandwidth for text-based assets
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # ─────────────────────────────────────────────────────────────────────────
    # Caching - static assets get long-term caching (Vite adds content hashes)
    # ─────────────────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Data files should not be cached - they may be updated independently
    location /data/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # SPA Routing - fallback to index.html for client-side routing
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
