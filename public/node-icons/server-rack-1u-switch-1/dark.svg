<!--
  server-rack-1u-switch-1/dark.svg

  1U Rack-Mount 48-Port Network Switch (Dark Theme)
  Dimensions: 380x35px (19" rack width at 1U height, ~10.9:1 aspect ratio)

  Design: High-density Ethernet switch with 48x RJ45 ports
  Color scheme: Cyan/Teal tones (#26c6da accent, #051515 chassis) - switch category

  RJ45 Port Specs: Real ports are ~11.7mm wide × 8.3mm high (~1.4:1 ratio)
  Icon uses 10×9px ports to fit 48 ports in available space

  Layout (left to right):
  - Rack ears (0-10px, 370-380px): mounting brackets with screw holes
  - Ethernet ports (16-302px): 2 rows × 24 RJ45 ports (48 total)
  - Power button (340px center): circular button with power symbol
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 35" width="380" height="35">

  <!-- ==================== RACK EARS ==================== -->
  <!-- Left rack ear with screw holes at y=8 and y=27 -->
  <rect x="0"   y="0" width="10" height="35" rx="2" fill="#051515" stroke="#26c6da" stroke-width="1"/>
  <circle cx="5" cy="8"  r="2"   fill="none" stroke="#26c6da" stroke-width="0.9"/>
  <circle cx="5" cy="27" r="2"   fill="none" stroke="#26c6da" stroke-width="0.9"/>
  <!-- Right rack ear with screw holes -->
  <rect x="370" y="0"  width="10" height="35" rx="2" fill="#051515" stroke="#26c6da" stroke-width="1"/>
  <circle cx="375" cy="8"  r="2" fill="none" stroke="#26c6da" stroke-width="0.9"/>
  <circle cx="375" cy="27" r="2" fill="none" stroke="#26c6da" stroke-width="0.9"/>

  <!-- ==================== CHASSIS ==================== -->
  <rect x="10" y="0" width="360" height="35" rx="1" fill="#051515" stroke="#26c6da" stroke-width="1.5"/>

  <!-- ==================== ETHERNET PORTS ==================== -->
  <!-- 48x RJ45 Ethernet ports arranged in 2 rows of 24 -->
  <!-- Port dimensions: 10×9px, 2px horizontal gap -->

  <!-- Row 1 (top): Ports 1-24, y=6 -->
  <rect x="16"  y="6" width="10" height="9" rx="1" fill="#0a1f1f" stroke="#26c6da" stroke-width="0.7"/>
  <rect x="28"  y="6" width="10" height="9" rx="1" fill="#0a1f1f" stroke="#26c6da" stroke-width="0.7"/>
