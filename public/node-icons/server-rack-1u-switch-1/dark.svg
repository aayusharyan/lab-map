  <rect x="292" y="20" width="10" height="9" rx="1" fill="#0a1f1f" stroke="#26c6da" stroke-width="0.7"/>

  <!-- ==================== POWER BUTTON ==================== -->
  <!-- Circular power button with IEC power symbol -->
  <circle cx="340" cy="17.5" r="9" fill="#0a1f1f" stroke="#26c6da" stroke-width="1.2"/>
  <!-- Power symbol arc (bottom semicircle) -->
  <path d="M 342.25 13.6 A 4.5 4.5 0 1 1 337.75 13.6" fill="none" stroke="#26c6da" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Power symbol line (vertical bar at top) -->
  <line x1="340" y1="11" x2="340" y2="15.5" stroke="#26c6da" stroke-width="1.2" stroke-linecap="round"/>
</svg>
