  <rect x="182.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 12 -->
  <rect x="198"   y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 13 -->
  <rect x="213.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 14 -->
