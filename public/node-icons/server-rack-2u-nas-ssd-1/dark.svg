  <rect x="291"   y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 19 -->
  <rect x="306.5" y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 20 -->
  <rect x="322"   y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 21 -->
  <rect x="337.5" y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 22 -->
