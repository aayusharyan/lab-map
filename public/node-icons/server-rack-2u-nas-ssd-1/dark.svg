  <rect x="244.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 16 -->
  <rect x="260"   y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 17 -->
  <rect x="275.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 18 -->
  <rect x="291"   y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 19 -->
  <rect x="306.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 20 -->
  <rect x="322"   y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 21 -->
  <rect x="337.5" y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 22 -->
  <rect x="353"   y="4" width="14" height="62" rx="1" fill="#0a150a" stroke="#4ade80" stroke-width="0.8"/>  <!-- Bay 23 -->

  <!-- ==================== HOT-SWAP HANDLE TABS ==================== -->
  <!-- Green release tabs at top of each drive bay (7px height) -->
  <rect x="12"    y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 1 -->
  <rect x="27.5"  y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 2 -->
  <rect x="43"    y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 3 -->
  <rect x="58.5"  y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 4 -->
  <rect x="74"    y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 5 -->
  <rect x="89.5"  y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 6 -->
  <rect x="105"   y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 7 -->
  <rect x="120.5" y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 8 -->
  <rect x="136"   y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 9 -->
  <rect x="151.5" y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 10 -->
  <rect x="167"   y="4" width="14" height="7" rx="1" fill="#16a34a"/>  <!-- Handle 11 -->
