<!--
  generic-internet-1/dark.svg

  Cloud / CDN Icon (Dark Theme)
  Dimensions: 24x24px (standard icon size)

  Design: Fluffy cloud shape representing internet/cloud services
  Color scheme: Blue tones (#38bdf8 stroke, #0a1e3d fill) - network/internet category

  Usage: Represents external cloud services (Cloudflare, AWS, etc.)
  Path: Single bezier curve forming classic cumulus cloud silhouette

  The path creates a cloud with:
  - Left small bump (bottom-left of cloud)
  - Central large bump (top of cloud)
  - Right bump (bottom-right of cloud)
  - Flat bottom connecting all sections
-->
