  <!-- Cloud shape: single path with curves forming cumulus cloud -->
  <path d="M6.5 20Q4.22 20 2.61 18.43 1 16.85 1 14.58q0-1.95 1.17-3.48 1.17-1.52 3.08-1.95.51-2.26 2.29-3.70Q9.32 4 11.5 4q2.93 0 4.96 2.04Q18.5 8.07 18.5 11q1.78.2 2.89 1.48Q22.5 13.75 22.5 15.5q0 1.88-1.31 3.19Q19.88 20 18 20z" fill="#0a1e3d" stroke="#38bdf8" stroke-width="0.4" stroke-linejoin="round"/>
</svg>
