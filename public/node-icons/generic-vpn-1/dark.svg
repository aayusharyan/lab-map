<!--
  generic-vpn-1/dark.svg

  VPN Shield Icon (Dark Theme)
  Dimensions: 24x24px (standard icon size)

  Design: Shield with keyhole representing secure VPN connection
  Color scheme: Blue tones (#38bdf8 stroke/accent, #0a1e3d fill) - network/security category

  Usage: Represents VPN connectivity, secure tunnel, encrypted connection
  Structure:
  - Shield shape: security/protection outline
  - Keyhole: lock/encryption symbol
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Shield shape -->
  <path d="M12 2 L3 6 L3 11 C3 16.5 6.8 21.5 12 23 C17.2 21.5 21 16.5 21 11 L21 6 Z"
        fill="#0a1e3d" stroke="#38bdf8" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Keyhole circle (top) -->
  <circle cx="12" cy="10" r="2.5" fill="#38bdf8"/>

  <!-- Keyhole slot (bottom) -->
  <path d="M10.5 10 L10.5 15 L13.5 15 L13.5 10" fill="#38bdf8"/>
</svg>
