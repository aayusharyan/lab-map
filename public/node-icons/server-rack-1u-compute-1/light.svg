<!--
  server-rack-1u-compute-1/light.svg

  1U Rack-Mount Compute Server (Light Theme)
  Dimensions: 380x35px (19" rack width at 1U height, ~10.9:1 aspect ratio)

  Design: Enterprise server front panel with mesh ventilation bays
  Color scheme: Blue tones (#0277bd accent, #e1f5fe chassis) - compute category

  Layout (left to right):
  - Rack ears (0-10px, 370-380px): mounting brackets with screw holes
  - LED strip (13-31px): power LED (blue), activity LED (green), warning LED (amber)
  - 8x mesh bays (34-343px): X-pattern ventilation panels for airflow
  - Port module (347-367px): USB ports and iDRAC management port
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 35" width="380" height="35">

  <!-- ==================== RACK EARS ==================== -->
  <!-- Left rack ear: mounting bracket with 2 screw holes at y=8 and y=27 -->
  <rect x="0"   y="0" width="10" height="35" rx="2" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
  <circle cx="5" cy="8"  r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <circle cx="5" cy="27" r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <!-- Right rack ear: matching bracket -->
  <rect x="370" y="0" width="10" height="35" rx="2" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
  <circle cx="375" cy="8"  r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <circle cx="375" cy="27" r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>

  <!-- ==================== CHASSIS BODY ==================== -->
  <!-- Main enclosure spanning between rack ears -->
  <rect x="10" y="0" width="360" height="35" rx="1" fill="#e1f5fe" stroke="#0277bd" stroke-width="1.5"/>

  <!-- ==================== STATUS LED STRIP ==================== -->
  <!-- Vertical LED panel on left side -->
  <rect x="13" y="4" width="18" height="27" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.7"/>
  <!-- Power LED (blue) - indicates system power -->
  <circle cx="22" cy="11" r="2.5" fill="#0277bd"/>
  <!-- Activity LED (green) - indicates disk/network activity -->
  <circle cx="22" cy="19" r="2.5" fill="#1b7a40"/>
  <!-- Warning LED (amber) - indicates alerts/warnings -->
  <circle cx="22" cy="27" r="2.5" fill="#b45309"/>

  <!-- ==================== VENTILATION BAYS ==================== -->
  <!-- 8 mesh bays with X-pattern for airflow, each 36px wide -->
  <!-- Bay 1 (x=34-70): X-mesh pattern with center crosshairs -->
  <rect x="34" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="34" y1="4"  x2="70" y2="31" stroke="#0288d1" stroke-width="1.2"/>  <!-- diagonal \ -->
  <line x1="70" y1="4"  x2="34" y2="31" stroke="#0288d1" stroke-width="1.2"/>  <!-- diagonal / -->
  <line x1="34" y1="17.5" x2="70" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>  <!-- horizontal center -->
  <line x1="52" y1="4"   x2="52" y2="31"   stroke="#0288d1" stroke-width="0.7"/>  <!-- vertical center -->

  <!-- Bay 2: x=73 -->
  <rect x="73" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="73" y1="4"  x2="109" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="109" y1="4" x2="73"  y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="73" y1="17.5" x2="109" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="91" y1="4"   x2="91"  y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 3: x=112 -->
  <rect x="112" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="112" y1="4"  x2="148" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="148" y1="4"  x2="112" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="112" y1="17.5" x2="148" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="130" y1="4"   x2="130" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 4: x=151 -->
  <rect x="151" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="151" y1="4"  x2="187" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="187" y1="4"  x2="151" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="151" y1="17.5" x2="187" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="169" y1="4"   x2="169" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 5: x=190 -->
  <rect x="190" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="190" y1="4"  x2="226" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="226" y1="4"  x2="190" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="190" y1="17.5" x2="226" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="208" y1="4"   x2="208" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 6: x=229 -->
  <rect x="229" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="229" y1="4"  x2="265" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="265" y1="4"  x2="229" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="229" y1="17.5" x2="265" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="247" y1="4"   x2="247" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 7: x=268 -->
  <rect x="268" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="268" y1="4"  x2="304" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="304" y1="4"  x2="268" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="268" y1="17.5" x2="304" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="286" y1="4"   x2="286" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- Bay 8: x=307 -->
  <rect x="307" y="4" width="36" height="27" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="307" y1="4"  x2="343" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="343" y1="4"  x2="307" y2="31" stroke="#0288d1" stroke-width="1.2"/>
  <line x1="307" y1="17.5" x2="343" y2="17.5" stroke="#0288d1" stroke-width="0.7"/>
  <line x1="325" y1="4"   x2="325" y2="31"   stroke="#0288d1" stroke-width="0.7"/>

  <!-- ==================== PORT MODULE ==================== -->
  <!-- Right-side I/O panel for USB and management access -->
  <rect x="347" y="4" width="20" height="27" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.7"/>
  <!-- USB-A port 1 (top) -->
  <rect x="350" y="8"  width="8" height="6" rx="1" fill="#e1f5fe" stroke="#0288d1" stroke-width="0.7"/>
  <!-- USB-A port 2 (bottom) -->
  <rect x="350" y="18" width="8" height="6" rx="1" fill="#e1f5fe" stroke="#0288d1" stroke-width="0.7"/>
  <!-- iDRAC/IPMI management port (circular) -->
  <circle cx="362" cy="17.5" r="3.5" fill="none" stroke="#0277bd" stroke-width="0.9"/>
</svg>
