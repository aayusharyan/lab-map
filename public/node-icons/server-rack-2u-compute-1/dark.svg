<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 70" width="380" height="70">
  <!-- 2U rack server — 19":3.5" = ~5.4:1 ratio -->

  <!-- Rack ears -->
  <rect x="0"   y="0" width="10" height="70" rx="2" fill="#0c2340" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="5" cy="13" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="5" cy="57" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <rect x="370" y="0"  width="10" height="70" rx="2" fill="#0c2340" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="375" cy="13" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="375" cy="57" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1"/>

  <!-- Chassis -->
  <rect x="10" y="0" width="360" height="70" rx="1" fill="#0c2340" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Top row: 4 landscape drive bays -->
  <rect x="14"  y="4"  width="84" height="28" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1"/>
  <rect x="103" y="4"  width="84" height="28" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1"/>
  <rect x="192" y="4"  width="84" height="28" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1"/>
  <rect x="281" y="4"  width="84" height="28" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1"/>

  <!-- Bottom strip: USB + LEDs + power -->
  <rect x="16"  y="38" width="20" height="12" rx="1" fill="#0a1e3a" stroke="#7dd3fc" stroke-width="0.9"/>
  <rect x="40"  y="38" width="20" height="12" rx="1" fill="#0a1e3a" stroke="#7dd3fc" stroke-width="0.9"/>
  <circle cx="80"  cy="57" r="3"   fill="#38bdf8"/>
  <circle cx="94"  cy="57" r="3"   fill="#27ae60"/>
  <circle cx="108" cy="57" r="3"   fill="#27ae60"/>
  <circle cx="122" cy="57" r="3"   fill="#f1c40f"/>

  <!-- Power button -->
  <circle cx="355" cy="52" r="10" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1.4"/>
  <line   x1="355" y1="45" x2="355" y2="52" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round"/>
</svg>
