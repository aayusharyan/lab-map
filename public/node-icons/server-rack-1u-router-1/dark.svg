<!--
  server-rack-1u-router-1/dark.svg

  1U Rack-Mount Router/Firewall (Dark Theme)
  Dimensions: 380x35px (19" rack width at 1U height, ~10.9:1 aspect ratio)

  Design: Network appliance with 16x RJ45 Ethernet ports and status LEDs
  Color scheme: Red tones (#e74c3c accent, #1a0505 chassis) - network category

  RJ45 Port Specs: Real ports are ~11.7mm wide × 8.3mm high (~1.4:1 ratio)
  Icon uses 12×10px ports to maintain realistic proportions at this scale

  Layout (left to right):
  - Rack ears (0-10px, 370-380px): mounting brackets with screw holes
  - LAN ports (20-137px): 2 rows × 8 RJ45 ports (16 total)
  - Status LEDs (270-300px): horizontal row
  - Power button (320px center): circular button with power symbol
  - WAN ports (348-360px): 2 rows × 1 RJ45 port (2 total, for uplink)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 35" width="380" height="35">

  <!-- ==================== RACK EARS ==================== -->
  <!-- Left rack ear with screw holes at y=8 and y=27 -->
  <rect x="0"   y="0" width="10" height="35" rx="2" fill="#1a0505" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="5" cy="8"  r="2"   fill="none" stroke="#e74c3c" stroke-width="0.9"/>
  <circle cx="5" cy="27" r="2"   fill="none" stroke="#e74c3c" stroke-width="0.9"/>
  <!-- Right rack ear with screw holes -->
  <rect x="370" y="0"  width="10" height="35" rx="2" fill="#1a0505" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="375" cy="8"  r="2" fill="none" stroke="#e74c3c" stroke-width="0.9"/>
  <circle cx="375" cy="27" r="2" fill="none" stroke="#e74c3c" stroke-width="0.9"/>

  <!-- ==================== CHASSIS ==================== -->
  <rect x="10" y="0" width="360" height="35" rx="1" fill="#1a0505" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- ==================== ETHERNET PORTS ==================== -->
  <!-- 16x RJ45 Ethernet ports arranged in 2 rows of 8 -->
  <!-- Port dimensions: 12×10px (matches RJ45 ratio ~1.2:1), 3px horizontal gap -->

  <!-- Row 1 (top): Ports 1-8, y=5 -->
  <rect x="20"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 1 -->
  <rect x="35"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 2 -->
  <rect x="50"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 3 -->
  <rect x="65"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 4 -->
  <rect x="80"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 5 -->
  <rect x="95"  y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 6 -->
  <rect x="110" y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 7 -->
  <rect x="125" y="5" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 8 -->

  <!-- Row 2 (bottom): Ports 9-16, y=20 -->
  <rect x="20"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 9 -->
  <rect x="35"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 10 -->
  <rect x="50"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 11 -->
  <rect x="65"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 12 -->
  <rect x="80"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 13 -->
  <rect x="95"  y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 14 -->
  <rect x="110" y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 15 -->
  <rect x="125" y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- Port 16 -->

  <!-- ==================== STATUS LEDs ==================== -->
  <!-- Horizontal row on right side, indicating system and link status -->
  <circle cx="270" cy="17.5" r="2.2" fill="#e74c3c"/>   <!-- Power LED (red) -->
  <circle cx="280" cy="17.5" r="2.2" fill="#27ae60"/>   <!-- Link 1 LED (green) -->
  <circle cx="290" cy="17.5" r="2.2" fill="#27ae60"/>   <!-- Link 2 LED (green) -->
  <circle cx="300" cy="17.5" r="2.2" fill="#27ae60"/>   <!-- Link 3 LED (green) -->

  <!-- ==================== POWER BUTTON ==================== -->
  <!-- Circular power button with IEC power symbol -->
  <circle cx="320" cy="17.5" r="9" fill="#0d0d0d" stroke="#e74c3c" stroke-width="1.2"/>
  <!-- Power symbol arc (bottom semicircle) -->
  <path d="M 322.25 13.6 A 4.5 4.5 0 1 1 317.75 13.6" fill="none" stroke="#e74c3c" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Power symbol line (vertical bar at top) -->
  <line x1="320" y1="11" x2="320" y2="15.5" stroke="#e74c3c" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ==================== WAN PORTS ==================== -->
  <!-- 2x RJ45 WAN ports (uplink) arranged in 2 rows of 1 -->
  <rect x="348" y="5"  width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- WAN 1 -->
  <rect x="348" y="20" width="12" height="10" rx="1" fill="#0d0d0d" stroke="#e74c3c" stroke-width="0.8"/>  <!-- WAN 2 -->
</svg>
