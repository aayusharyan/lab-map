<!--
  server-rack-2u-nas-hdd-1/light.svg

  2U Rack-Mount NAS with 3.5" HDD Bays (Light Theme)
  Dimensions: 380x70px (19" rack width at 2U height, ~5.4:1 aspect ratio)

  Design: Storage server with 8x 3.5" hot-swap HDD bays in 4x2 grid
  Color scheme: Green tones (#2e7d32 accent, #e8f5e9 chassis) - storage category

  Layout:
  - Rack ears (0-10px, 370-380px): mounting brackets with screw holes at y=13, y=57
  - 8 drive bays in 2 rows of 4, landscape orientation (84x28px each)
  - Each bay represents a hot-swap 3.5" HDD caddy
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 70" width="380" height="70">

  <!-- ==================== RACK EARS ==================== -->
  <!-- Left rack ear with screw holes -->
  <rect x="0"   y="0" width="10" height="70" rx="2" fill="#dcedc8" stroke="#2e7d32" stroke-width="1.2"/>
  <circle cx="5" cy="13" r="2.5" fill="none" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="5" cy="57" r="2.5" fill="none" stroke="#2e7d32" stroke-width="1"/>
  <!-- Right rack ear with screw holes -->
  <rect x="370" y="0"  width="10" height="70" rx="2" fill="#dcedc8" stroke="#2e7d32" stroke-width="1.2"/>
  <circle cx="375" cy="13" r="2.5" fill="none" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="375" cy="57" r="2.5" fill="none" stroke="#2e7d32" stroke-width="1"/>

  <!-- ==================== CHASSIS BODY ==================== -->
  <rect x="10" y="0" width="360" height="70" rx="1" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- ==================== DRIVE BAYS ==================== -->
  <!-- Top row: 4x 3.5" HDD hot-swap bays (landscape orientation) -->
  <rect x="14"  y="4"  width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 1 -->
  <rect x="103" y="4"  width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 2 -->
  <rect x="192" y="4"  width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 3 -->
  <rect x="281" y="4"  width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 4 -->

  <!-- Bottom row: 4x 3.5" HDD hot-swap bays (landscape orientation) -->
  <rect x="14"  y="37" width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 5 -->
  <rect x="103" y="37" width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 6 -->
  <rect x="192" y="37" width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 7 -->
  <rect x="281" y="37" width="84" height="28" rx="2" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>  <!-- Bay 8 -->
</svg>
