<!--
  server-rack-1u-compute-2/dark.svg

  1U Rack-Mount Compute Server - Drive Bay Variant (Dark Theme)
  Dimensions: 380x35px (19" rack width at 1U height, ~10.9:1 aspect ratio)

  Design: Compact compute server with 2 front drive bays, ventilation, USB ports, and power button
  Color scheme: Blue tones (#38bdf8 accent, #0c2340 chassis) - compute category

  Layout (left to right):
  - Rack ears (0-10px, 370-380px): mounting brackets with screw holes
  - 2x drive bays (16-180px): landscape orientation, 80x25px each
  - Ventilation grille (190-260px): airflow for compute components
  - 2x USB-A ports (270-302px): front I/O access
  - Status LEDs (312-332px): power (blue), HDD (green), network (amber)
  - Power button (355px center): circular with IEC symbol
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 35" width="380" height="35">

  <!-- ==================== RACK EARS ==================== -->
  <!-- Left rack ear with screw holes at y=8, y=27 -->
  <rect x="0"   y="0" width="10" height="35" rx="2" fill="#0c2340" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="5" cy="8"  r="2"   fill="none" stroke="#38bdf8" stroke-width="0.9"/>
  <circle cx="5" cy="27" r="2"   fill="none" stroke="#38bdf8" stroke-width="0.9"/>
  <!-- Right rack ear with screw holes -->
  <rect x="370" y="0"  width="10" height="35" rx="2" fill="#0c2340" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="375" cy="8"  r="2" fill="none" stroke="#38bdf8" stroke-width="0.9"/>
  <circle cx="375" cy="27" r="2" fill="none" stroke="#38bdf8" stroke-width="0.9"/>

  <!-- ==================== CHASSIS BODY ==================== -->
  <rect x="10" y="0" width="360" height="35" rx="1" fill="#0c2340" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- ==================== DRIVE BAYS ==================== -->
  <!-- 2x front-accessible drive bays (80x25px each, matching NAS proportions) -->
  <rect x="16"  y="5" width="80" height="25" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="0.9"/>  <!-- Bay 1 -->
  <rect x="100" y="5" width="80" height="25" rx="1" fill="#0a1e3a" stroke="#38bdf8" stroke-width="0.9"/>  <!-- Bay 2 -->

  <!-- ==================== VENTILATION GRILLE ==================== -->
  <!-- Honeycomb-style vent for CPU/GPU cooling (7 vertical slots) -->
  <rect x="190" y="6" width="70" height="23" rx="2" fill="#0a1e3a" stroke="#38bdf8" stroke-width="0.7"/>
  <line x1="200" y1="9" x2="200" y2="26" stroke="#38bdf8" stroke-width="0.6"/>
  <line x1="210" y1="9" x2="210" y2="26" stroke="#38bdf8" stroke-width="0.6"/>
  <line x1="220" y1="9" x2="220" y2="26" stroke="#38bdf8" stroke-width="0.6"/>
  <line x1="230" y1="9" x2="230" y2="26" stroke="#38bdf8" stroke-width="0.6"/>
  <line x1="240" y1="9" x2="240" y2="26" stroke="#38bdf8" stroke-width="0.6"/>
  <line x1="250" y1="9" x2="250" y2="26" stroke="#38bdf8" stroke-width="0.6"/>

  <!-- ==================== USB PORTS ==================== -->
  <!-- 2x USB-A ports for front I/O -->
  <rect x="270" y="9" width="14" height="8" rx="1" fill="#0a1e3a" stroke="#7dd3fc" stroke-width="0.8"/>  <!-- USB 1 -->
  <rect x="288" y="9" width="14" height="8" rx="1" fill="#0a1e3a" stroke="#7dd3fc" stroke-width="0.8"/>  <!-- USB 2 -->

  <!-- ==================== STATUS LEDs ==================== -->
  <!-- Power LED (blue) -->
  <circle cx="312" cy="12" r="2.2" fill="#38bdf8"/>
  <!-- HDD activity LED (green) -->
  <circle cx="322" cy="12" r="2.2" fill="#27ae60"/>
  <!-- Network activity LED (amber) -->
  <circle cx="332" cy="12" r="2.2" fill="#f59e0b"/>

  <!-- ==================== POWER BUTTON ==================== -->
  <!-- Circular power button with IEC power symbol -->
  <circle cx="355" cy="17.5" r="9" fill="#0a1e3a" stroke="#38bdf8" stroke-width="1.2"/>
  <!-- Power symbol arc (bottom semicircle) -->
  <path d="M 357.25 13.6 A 4.5 4.5 0 1 1 352.75 13.6" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Power symbol line (vertical bar at top) -->
  <line x1="355" y1="11" x2="355" y2="15.5" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round"/>
</svg>
