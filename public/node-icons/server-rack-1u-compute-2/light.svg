<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 35" width="380" height="35">
  <!-- 1U rack server (light) -->

  <!-- Rack ears -->
  <rect x="0"   y="0" width="10" height="35" rx="2" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
  <circle cx="5" cy="8"  r="2"   fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <circle cx="5" cy="27" r="2"   fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <rect x="370" y="0"  width="10" height="35" rx="2" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
  <circle cx="375" cy="8"  r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>
  <circle cx="375" cy="27" r="2" fill="none" stroke="#0277bd" stroke-width="0.9"/>

  <!-- Chassis -->
  <rect x="10" y="0" width="360" height="35" rx="1" fill="#e1f5fe" stroke="#0277bd" stroke-width="1.5"/>

  <!-- 4 drive/bay slots on left -->
  <rect x="16"  y="5"  width="60" height="25" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.9"/>
  <rect x="80"  y="5"  width="60" height="25" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.9"/>
  <rect x="144" y="5"  width="60" height="25" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.9"/>
  <rect x="208" y="5"  width="60" height="25" rx="1" fill="#b3e5fc" stroke="#0277bd" stroke-width="0.9"/>

  <!-- USB ports -->
  <rect x="278" y="9" width="14" height="8" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.8"/>
  <rect x="296" y="9" width="14" height="8" rx="1" fill="#b3e5fc" stroke="#0288d1" stroke-width="0.8"/>

  <!-- LEDs -->
  <circle cx="322" cy="12" r="2.2" fill="#0277bd"/>
  <circle cx="332" cy="12" r="2.2" fill="#1b7a40"/>

  <!-- Power button -->
  <circle cx="355" cy="17.5" r="9" fill="#b3e5fc" stroke="#0277bd" stroke-width="1.2"/>
  <path d="M 357.25 13.6 A 4.5 4.5 0 1 1 352.75 13.6" fill="none" stroke="#0277bd" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="355" y1="11" x2="355" y2="15.5" stroke="#0277bd" stroke-width="1.2" stroke-linecap="round"/>
</svg>
