# Automated Release Workflow
#
# Creates versioned releases with Docker images on GitHub Container Registry.
# Uses semantic versioning (MAJOR.MINOR.PATCH) with Git tags as source of truth.
#
# Usage: Actions tab → Create Release → Run workflow → Select version bump type
#
# Flow: Calculate version → Update files → Commit → Tag → Build Docker → Release
#
# Customization:
#   - Change default bump type in workflow_dispatch.inputs.version_bump.default
#   - Modify Docker tags in the "Extract metadata" step
#   - Edit release notes template in "Generate changelog" step

name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor

# ---------------------------------------------------------------------------
# Configuration
# ---------------------------------------------------------------------------

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # For commits, tags, and releases
      packages: write   # For pushing Docker images to GHCR

    # -------------------------------------------------------------------------
    # Version Calculation
    # -------------------------------------------------------------------------

    steps:
      # Fetch full history - required for tag detection and changelog generation
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Find latest vX.Y.Z tag, bump major/minor, reset lower components to 0
      - name: Calculate new version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "${{ github.event.inputs.version_bump }}" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          else
            MINOR=$((MINOR + 1))
            PATCH=0
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT

      # -------------------------------------------------------------------------
      # Version Bump & Git Operations
      # -------------------------------------------------------------------------

      - name: Update version in codebase
        run: |
          # Update version in package.json using jq for proper JSON handling
          jq '.version = "${{ steps.version.outputs.version_number }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

          # Update LABEL version in docker/Dockerfile
          sed -i 's/LABEL version=".*"/LABEL version="${{ steps.version.outputs.version_number }}"/' docker/Dockerfile

          echo "Updated version in package.json:"
          grep '"version"' package.json
          echo ""
          echo "Updated version in docker/Dockerfile:"
          grep 'LABEL version=' docker/Dockerfile

      - name: Commit and push version bump
        run: |
          git config user.name "Aayush Sinha"
          git config user.email "hello@yush.dev"
          git add package.json docker/Dockerfile
          git commit -m "chore: bump version to ${{ steps.version.outputs.version_number }}"
          git push origin main

      - name: Create and push tag
        run: |
          git config user.name "Aayush Sinha"
          git config user.email "hello@yush.dev"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

      # -------------------------------------------------------------------------
      # GitHub Release
      # -------------------------------------------------------------------------

      # Collect commits since previous tag for release notes
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 2 | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${PREV_TAG}..${{ steps.version.outputs.new_version }} --pretty=format:"- %s (%h)" --no-merges)
          fi

          cat > RELEASE_NOTES.md <<EOF
          ## What's Changed

          ${COMMITS}

          ## Docker Images

          \`\`\`bash
          # Stable latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Specific version (immutable)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_number }}

          # Rolling tags (auto-update to latest patch/minor)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
          \`\`\`

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.new_version }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # Docker Build & Push
      # -------------------------------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: latest (stable), X.Y.Z (immutable), X.Y (rolling minor), X (rolling major)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version_number }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=${{ steps.version.outputs.major }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------------------------------------------------------
      # Summary
      # -------------------------------------------------------------------------

      - name: Release summary
        run: |
          echo "### Release Created :tada:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** \`${{ github.event.inputs.version_bump }}\` version bump" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` (stable)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_number }}\` (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}\` (rolling)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}\` (rolling)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.new_version }})" >> $GITHUB_STEP_SUMMARY
