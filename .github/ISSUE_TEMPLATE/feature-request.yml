name: Feature Request
description: Suggest a new feature or improvement for Lab Map
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what use case does it enable?
      placeholder: |
        e.g. "I can't filter nodes by VLAN in the graph view, so large topologies are hard to read"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see. Be as specific as possible.
      placeholder: |
        e.g. "A sidebar filter panel that lets you select one or more VLANs and grays out unrelated nodes"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Lab Map does this relate to?
      options:
        - Graph / Network topology view
        - Rack view
        - Data configuration / JSON format
        - Docker / deployment
        - Performance
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds, or considered other approaches?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, links, or any other context that helps explain the feature
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and this has not been requested before
          required: false
        - label: I am willing to help implement or test this feature
          required: false
